<div style="margin-left: auto; margin-right: auto">
  <p id="categoryFeedback"></p>
</div>

<div class="max-w-4xl mx-auto">
  <form
    [formGroup]="categoryForm"
    (ngSubmit)="saveCategory()"
    class="p-4 w-full max-w-7xl mx-auto"
  >
    <mat-card appearance="outlined">
      <mat-card-content>
        <div class="grid md:grid-cols-2 gap-6">
          <div class="flex flex-col space-y-4 p-4">
            <img
              src="https://ui.angular-material.dev/app-ui/logo.svg"
              alt="Logo"
              height="48"
              width="48"
              class="inline"
            />
            <h1 class="text-3xl text-white">Add Category</h1>
            <!-- <p class="text-white">to continue to Application</p> -->
          </div>

          <div class="flex flex-col space-y-4 p-4 md:mt-12">
            <mat-form-field class="w-full">
              <mat-label>Title</mat-label>
              <input
                type="text"
                matInput
                formControlName="title"
                placeholder="Enter category title"
              />
              <mat-error class="text-error">{{
                getErrorMessage(title)
              }}</mat-error>
            </mat-form-field>

            <mat-form-field class="w-full">
              <mat-label>Description</mat-label>
              <input
                matInput
                type="text"
                formControlName="description"
                placeholder="Enter category description"
              />
              <mat-error class="text-error">{{
                getErrorMessage(description)
              }}</mat-error>
            </mat-form-field>

            <mat-form-field class="w-full">
              <mat-label>Css color</mat-label>
              <input
                matInput
                type="text"
                formControlName="css_color"
                placeholder="Enter css color"
              />
              <mat-error class="text-error">{{
                getErrorMessage(css_color)
              }}</mat-error>
            </mat-form-field>
          </div>
        </div>
      </mat-card-content>

      <mat-card-actions align="end" class="gap-4">
        <button mat-flat-button type="submit">Save</button>
      </mat-card-actions>
    </mat-card>
  </form>
</div>
