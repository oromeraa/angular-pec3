<div class="w-3/5 h-full grid grid-cols-3 gap-4 p-4 mx-auto" [@listAnimation]="posts.length">
  <div *ngFor="let post of posts" class="card overflow-hidden">
    <mat-card
      appearance="outlined"
      class="h-full flex flex-col justify-between"
    >
      <mat-card-header
        class="max-w-2xl justify-center gap-4 items-center !py-4 h-24"
      >
        <mat-chip-set>
          <mat-chip
            *ngFor="let category of post.categories"
            class="badge"
            [ngStyle]="{ 'background-color': category.css_color }"
          >
            {{ category.title }}
          </mat-chip>
        </mat-chip-set>
      </mat-card-header>
      <mat-card-content
        class="flex flex-col flex-grow max-w-2xl justify-center gap-6 !py-2 bg-slate-600"
      >
        <mat-card-title class="!text-2xl !font-bold">{{
          post.title
        }}</mat-card-title>
        <mat-card-subtitle class="!text-sm !text-gray-400">{{
          post.publication_date | formatDate: 3
        }}</mat-card-subtitle>
        <p class="!text-base !text-wrap !truncate">{{ post.description }}</p>
        <!-- <p>{{ post.userAlias }}</p> -->
      </mat-card-content>

      <mat-card-actions
        class="flex flex-row gap-4 h-20 justify-center bg-slate-800"
      >
        <button
          mat-button
          [disabled]="!showButtons"
          (click)="like(post.postId)"
          class="w-full"
        >
          <mat-icon>thumb_up</mat-icon>
          {{ post.num_likes }}
        </button>
        <button
          mat-button
          [disabled]="!showButtons"
          (click)="dislike(post.postId)"
          class="w-full"
        >
          <mat-icon>thumb_down</mat-icon>
          {{ post.num_dislikes }}
        </button>
      </mat-card-actions>
    </mat-card>
  </div>
</div>
