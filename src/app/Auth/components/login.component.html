<div style="margin-left: auto; margin-right: auto">
  <p id="loginFeedback"></p>
</div>

<div class="max-w-4xl mx-auto">
  <form
    [formGroup]="loginForm"
    (ngSubmit)="login()"
    class="p-4 w-full max-w-7xl mx-auto"
  >
    <mat-card appearance="outlined">
      <mat-card-content>
        <div class="grid md:grid-cols-2 gap-6">
          <div class="flex flex-col space-y-4 p-4">
            <img
              src="https://ui.angular-material.dev/app-ui/logo.svg"
              alt="Logo"
              height="48"
              width="48"
              class="inline"
            />
            <h1 class="text-3xl text-white">Sign in</h1>
            <p class="text-white">to continue to Application</p>
          </div>

          <div class="flex flex-col space-y-4 p-4 md:mt-12">
            <app-input-email
              label="Email"
              [control]="email"
              placeholder="Ex: user@uoc.com"
              errorMessage="Introduce un correo válido"
            ></app-input-email>

            <app-input-password
              label="Enter your password"
              [control]="password"
              errorMessage="La contraseña es obligatoria"
            ></app-input-password>
          </div>
        </div>
      </mat-card-content>

      <mat-card-actions align="end" class="gap-4">
        <button mat-button (click)="toRegisterPage()">Create account</button>
        <button mat-flat-button type="submit">Sign in</button>
      </mat-card-actions>
    </mat-card>
  </form>
</div>
