<div class="container-login">
  <form
    [formGroup]="loginForm"
    (ngSubmit)="login()"
    class="p-4 max-w-7xl mx-auto"
  >
    <mat-card appearance="outlined">
      <mat-card-content>
        <div class="grid md:grid-cols-2 gap-6">
          <div class="flex flex-col space-y-4 p-4">
            <img
              src="https://ui.angular-material.dev/app-ui/logo.svg"
              alt="Logo"
              height="48"
              width="48"
              class="inline"
            />
            <h1 class="text-3xl text-white">Sign in</h1>
            <p class="text-white">to continue to Application</p>
          </div>

          <div class="flex flex-col space-y-2 p-4 md:mt-12">
            <mat-form-field class="w-full">
              <mat-label>Email</mat-label>
              <input
                type="email"
                matInput
                formControlName="email"
                placeholder="Ex: user@uoc.com"
              />
              <mat-error class="text-error">{{
                getErrorMessage(email)
              }}</mat-error>
            </mat-form-field>

            <mat-form-field class="w-full">
              <mat-label>Enter your password</mat-label>
              <input
                matInput
                [type]="hide() ? 'password' : 'text'"
                formControlName="password"
              />
              <button
                mat-icon-button
                matSuffix
                (click)="clickEvent($event)"
                [attr.aria-label]="'Hide password'"
                [attr.aria-pressed]="hide()"
              >
                <mat-icon>{{
                  hide() ? "visibility_off" : "visibility"
                }}</mat-icon>
              </button>
              <mat-error class="text-error">{{
                getErrorMessage(password)
              }}</mat-error>
            </mat-form-field>
          </div>
        </div>
      </mat-card-content>

      <mat-card-actions align="end">
        <button mat-button (click)="register()">Create account</button>
        <button mat-flat-button type="submit">Sign in</button>
      </mat-card-actions>
    </mat-card>
  </form>
</div>
